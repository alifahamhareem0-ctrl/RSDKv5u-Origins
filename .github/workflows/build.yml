name: Build RSDKv5U (Origins)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  # --- JOB 1: WINDOWS x64 BUILD ---
  build-win64:
    name: Windows x64 Build (Plus Enabled)
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Bootstrap vcpkg
      run: |
        cd C:\vcpkg
        .\bootstrap-vcpkg.bat
      shell: pwsh

    - name: Configure CMake
      run: |
        cmake -G "Ninja" -B build `
          -DRETRO_REVISION=3 `
          -DRETRO_DISABLE_PLUS=OFF `
          -DCMAKE_BUILD_TYPE=Release `
          -DVCPKG_TARGET_TRIPLET=x64-windows `
          -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
      shell: pwsh

    - name: Build Project
      run: cmake --build build --config Release

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rsdkv5u-win64
        path: build/

  # --- JOB 2: ANDROID APK BUILD (FIXED NATIVE LIBS PATHING) ---
  build-android:
    name: Android APK Build (Plus Enabled)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # FIX: Download and deploy raw dependencies directly into the structural Android pathing trees
    - name: Inject Android Audio Dependencies
      run: |
        mkdir -p dependencies/android
        
        # Download and place libogg
        curl -L https://xiph.org -o libogg.tar.gz
        tar -xzf libogg.tar.gz
        mv libogg-1.3.5 dependencies/android/libogg
        
        # Download and place libtheora
        curl -L https://xiph.org -o libtheora.tar.gz
        tar -xzf libtheora.tar.gz
        mv libtheora-1.1.1 dependencies/android/libtheora

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK & NDK
      uses: android-actions/setup-android@v3

    - name: Compile Native Libs and Package APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease \
          -Pandroid.injected.cmake.arguments="-DRETRO_REVISION=3 -DRETRO_DISABLE_PLUS=OFF"

    - name: Upload Android Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rsdkv5u-android-release
        path: android/app/build/outputs/apk/release/*.apk
