name: Windows 64-bit Automated Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: 

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build Executable via MSBuild Solution
      # Directly targets the native project structure bypassing the CMake setup block
      run: msbuild RSDKv5U.sln /p:Configuration=Release /p:Platform=x64 /m

    - name: Upload Finished Windows 64-bit Build
      uses: actions/upload-artifact@v4
      with:
        name: rsdkv5u-origins-win64
        path: |
          x64/Release/
          bin/x64/Release/
