name: Android Automated Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: # Allows you to manually click "Run workflow" from GitHub

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository cleanly
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # Step 2: Set up Java Environment required by Gradle
    - name: Set up JDK 17
      uses: actions/actions-setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Step 3: Fetch static multimedia audio/video dependencies in the correct root directory
    - name: Download Multimedia Libraries
      run: |
        mkdir -p dependencies/android
        cd dependencies/android
        
        # Download legal stable versions of Ogg and Theora
        curl -L https://xiph.org -o ogg.tar.gz
        curl -L https://xiph.org -o theora.tar.gz
        
        # Extract files
        tar -xzf ogg.tar.gz
        tar -xzf theora.tar.gz
        
        # Rename folders to meet precise NDK configuration expectations
        mv libogg-1.3.5 libogg
        mv libtheora-1.1.1 libtheora

    # Step 4: Construct relative Linux Symlinks for the native compiler
    - name: Create Native Engine Links
      run: |
        cd android/app/jni
        ln -s "../../../" "RSDKv5"

    # Step 5: Setup Android NDK Environment Toolchain
    - name: Install Android NDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: '25.1.8937393'

    # Step 6: Make the local Gradle wrapper executable
    - name: Grant Execute Permission to Gradle
      run: chmod +x android/gradlew

    # Step 7: Build the project with Plus features enabled (RETRO_DISABLE_PLUS=false)
    - name: Build Android Debug APK
      run: |
        cd android
        ./gradlew assembleDebug -PretroRevision=3 -PretroDisablePlus=false

    # Step 8: Package and upload the output to GitHub Artifacts
    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rsdkv5u-origins-android-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
