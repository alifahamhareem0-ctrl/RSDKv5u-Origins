name: Build RSDKv5U (Origins)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  # --- JOB 1: WINDOWS 64-BIT BUILD (PLUS ENABLED) ---
  build-win64:
    name: Windows x64 Build (Plus Enabled)
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Configure CMake
      run: |
        cmake -B build `
          -DRETRO_REVISION=3 `
          -DRETRO_DISABLE_PLUS=OFF `
          -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: cmake --build build --config Release

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rsdkv5u-win64
        path: build/Release/

  # --- JOB 2: ANDROID APK BUILD (PLUS ENABLED) ---
  build-android:
    name: Android APK Build (Plus Enabled)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK & NDK
      uses: android-actions/setup-android@v3

    # Forces compilation of native engine binaries (.so) directly into the app package
    - name: Compile Native Libs and Package APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease \
          -Pandroid.injected.cmake.arguments="-DRETRO_REVISION=3 -DRETRO_DISABLE_PLUS=OFF"

    - name: Upload Android Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rsdkv5u-android-release
        path: android/app/build/outputs/apk/release/
