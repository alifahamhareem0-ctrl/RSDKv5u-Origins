name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch: # Allows you to trigger the build manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the repo with all underlying submodules recursively
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # Step 2: Set up Java Environment required by Gradle
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Step 3: Install Android NDK and SDK tools
    - name: Setup Android SDK & NDK
      uses: android-actions/setup-android@v4

    # Step 4: Create the essential JNI Symlink for the NDK compiler
    - name: Create JNI Symlink
      run: |
        cd android/app/jni
        ln -s ../../.. RSDKv5

    # step middle
    - name: download dependencies
      run: |
        cd  ../../../dependencies/android/
        curl -o libogg.tar.gz https://downloads.xiph.org/releases/ogg/libogg-1.3.6.tar.gz
        curl -o libtheora.tar.gz https://downloads.xiph.org/releases/theora/libtheora-1.2.0.tar.gz

        tar -xf libogg.tar.gz
        tar -xf libtheora.tar.gz

        mv libogg-1.3.6 libogg
        mv libtheora-1.2.0 libtheora

        cd ../../android

    # Step 5: Grant execute permissions to the Gradle wrapper
    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    # Step 6: Compile the Debug APK
    - name: Build with Gradle
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon

    # Step 7: Upload the finished APK file as a GitHub Artifact
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RSDKv5u-Origins-Android-Debug
        path: android/app/build/outputs/apk/debug/*.apk
